 fatih_sultan_mehmet:0 "Fatih Sultan Mehmet"
 
 # Character Names
 mehmet_ii:0 "II. Mehmet"
 bayezid_ii:0 "II. Bayezid" 
 murad_ii:0 "II. Murad"
 orhan_gazi:0 "Orhan Gazi"
