 # Titles
 ottoman_empire_title:0 "Osmanlı İmparatorluğu"
 constantinople_title:0 "Konstantiniyye"
 istanbul_title:0 "İstanbul"
 bursa_title:0 "Bursa"
 edirne_title:0 "Edirne"
 
 # Traits
 conqueror_of_constantinople:0 "Konstantiniyye Fatihi"
 conqueror_of_constantinople_desc:0 "Bu karakter Konstantiniyye'yi (İstanbul) fethetmiştir ve İslam dünyasında büyük saygı görmektedir."
 
 ottoman_legacy:0 "Osmanlı Mirası"
 ottoman_legacy_desc:0 "Bu karakter Osmanlı hanedanının bir üyesidir ve büyük bir mirasa sahiptir."
 
 ghazi_warrior:0 "Gazi Savaşçısı"
 ghazi_warrior_desc:0 "Bu karakter İslam için savaşan kutsal bir savaşçıdır."
 
 grand_vizier:0 "Sadrazam"
 grand_vizier_desc:0 "Bu karakter Osmanlı İmparatorluğu'nun en üst düzey yöneticisidir."
 
 janissary_commander:0 "Yeniçeri Ağası"
 janissary_commander_desc:0 "Bu karakter Yeniçeri ordusunun komutanıdır."
 
 master_of_siege:0 "Kuşatma Ustası"
 master_of_siege_desc:0 "Bu karakter kuşatma savaşında uzmandır."
 
 turkish_poet:0 "Türk Şairi"
 turkish_poet_desc:0 "Bu karakter Türkçe şiir yazan yetenekli bir sanatçıdır."
 
 ottoman_architect:0 "Osmanlı Mimarı"
 ottoman_architect_desc:0 "Bu karakter Osmanlı mimarisinde ustadır."
 
 devshirme_officer:0 "Devşirme Subayı"
 devshirme_officer_desc:0 "Bu karakter devşirme sistemi ile yetişmiş bir subaydir."
 
 sultan_of_sultans:0 "Sultanlar Sultanı"
 sultan_of_sultans_desc:0 "Bu karakter tüm sultanların üstünde olan büyük bir hükümdardır."
 
 master_calligrapher:0 "Hat Ustası"
 master_calligrapher_desc:0 "Bu karakter Osmanlı hat sanatında ustadır."
 
 sufi_mystic:0 "Sufi Mutasavvıfı"
 sufi_mystic_desc:0 "Bu karakter tasavvuf yolunda ilerleyen bir Allah dostudur."
 
 ottoman_diplomat:0 "Osmanlı Diplomatı"
 ottoman_diplomat_desc:0 "Bu karakter diplomatik işlerde mahir bir temsilcidir."
 
 master_craftsman:0 "Usta Zanaatkar"
 master_craftsman_desc:0 "Bu karakter zanaat işlerinde usta olan bir marangoz, kuyumcu veya diğer el sanatları ustasıdır."
 
 palace_guardian:0 "Saray Muhafızı"
 palace_guardian_desc:0 "Bu karakter sarayı koruyan seçkin bir savaşçıdır."
 
 ottoman_scholar:0 "Osmanlı Alimi"
 ottoman_scholar_desc:0 "Bu karakter İslami ilimlerde derin bilgi sahibi bir alimdir."
 
 silk_road_trader:0 "İpek Yolu Tüccarı"
 silk_road_trader_desc:0 "Bu karakter uzun mesafeli ticarette uzman bir tüccardır."
 
 palace_musician:0 "Saray Müzisyeni"
 palace_musician_desc:0 "Bu karakter sarayda müzik icra eden yetenekli bir sanatçıdır."
 
 ottoman_explorer:0 "Osmanlı Kaşifi"
 ottoman_explorer_desc:0 "Bu karakter yeni yerler keşfetmeyi seven cesur bir kaşiftir."
 
 master_gardener:0 "Bahçıvan Ustası"
 master_gardener_desc:0 "Bu karakter saray bahçelerini düzenleyen usta bir bahçıvandır."
 
 # Events
 conquest_of_constantinople:0 "Konstantiniyye'nin Fethi"
 conquest_of_constantinople_desc:0 "Büyük gün geldi! Konstantiniyye'nin suları karşımızda duruyor ve şehrin kadim surları bizim kararlılığımız karşısında çaresiz kalıyor. Bu fetih İslam dünyası için büyük bir zafer olacak!"
 
 # Event Titles and Descriptions
 conquest_constantinople.001.t:0 "Konstantiniyye Kuşatması Hazırlıkları"
 conquest_constantinople.001.desc:0 "Zafer yakındır! Konstantiniyye'yi kuşatmak için ordularımız hazır. Bu kutsal şehri fethetmek İslam dünyası için büyük bir onur olacak."
 conquest_constantinople.001.a:0 "Allahu Ekber! Kuşatmaya başlayalım!"
 conquest_constantinople.001.b:0 "Henüz hazır değiliz, bekleyelim."
 
 conquest_constantinople.002.t:0 "Büyük Top"
 conquest_constantinople.002.desc:0 "Macar usta Orban bizim için devasa bir top inşa etti. Bu silah Konstantiniyye'nin surlarını yıkacak!"
 conquest_constantinople.002.a:0 "En büyük topu yapalım!"
 conquest_constantinople.002.b:0 "Küçük top yeterli olur."
 
 conquest_constantinople.003.t:0 "Son Saldırı"
 conquest_constantinople.003.desc:0 "Konstantiniyye'nin surları yıkıldı! Son saldırının zamanı geldi!"
 conquest_constantinople.003.a:0 "İstanbul bizimdir!"
 
 conquest_constantinople.004.t:0 "Fethten Sonra"
 conquest_constantinople.004.desc:0 "İstanbul fethedildi! Şimdi ne yapalım?"
 conquest_constantinople.004.a:0 "Şehir halkına iyi davranacağız."
 conquest_constantinople.004.b:0 "Ganimetleri topluyalım!"
 
 conquest_constantinople.005.t:0 "Şehrin Adı"
 conquest_constantinople.005.desc:0 "Konstantiniyye artık bizim elimizde. Bu şehrin adını değiştirmeli miyiz?"
 conquest_constantinople.005.a:0 "Artık burası İstanbul'dur!"
 conquest_constantinople.005.b:0 "Konstantiniyye adı kalsın."
 
